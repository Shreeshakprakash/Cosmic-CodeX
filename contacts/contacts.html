<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SafeNova - Emergency Contacts</title>
    <meta name="theme-color" content="#121212">
    <link rel="icon" type="image/x-icon" href="../icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../icons/favicon-16x16.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-styles.css">
    <link rel="stylesheet" href="../shared-navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .contacts-container { padding-bottom: 90px; }
        .page-header { margin-bottom: 24px; }
        
        .contact-card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .contact-info h3 { margin-bottom: 4px; font-size: 1.1rem; }
        .contact-info p { color: var(--text-secondary); font-size: 0.9rem; }
        
        .contact-actions button {
            background: rgba(255, 59, 59, 0.1);
            border: none;
            color: var(--danger-color);
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .contact-actions button:hover { background: var(--danger-color); color: white; }

        .contact-actions {
            display: flex;
            gap: 8px;
        }

        .contact-actions .call-btn {
            background: rgba(0, 230, 118, 0.12);
            color: #00e676;
        }

        .contact-actions .call-btn:hover {
            background: #00e676;
            color: #0b1320;
        }

        .add-contact-form {
            background-color: var(--surface-color);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>

    <nav class="sn-navbar">
        <a href="../index.html" class="sn-logo">
            SafeNova
            <div class="sn-logo-dot"></div>
        </a>
        <ul class="sn-nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="contacts.html" class="is-active">Contacts</a></li>
            <li><a href="../tracking/tracking.html">Tracking</a></li>
            <li><a href="../settings/settings.html">Settings</a></li>
        </ul>
        <div class="sn-nav-actions">
            <div class="sn-user-info" id="userInfo" style="display: none;">
                <span class="sn-user-name" id="userName">Loading...</span>
                <button id="logoutBtn" class="sn-logout-btn" aria-label="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
            <a href="../login/login.html" class="sn-login-btn" id="loginNavBtn">Login</a>
        </div>
    </nav>

    <main class="container contacts-container">
        
        <div class="add-contact-form">
            <h3 style="margin-bottom: 15px;">Add Trusted Contact</h3>
            <form id="add-contact-form" class="auth-form" style="margin-top: 0;">
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="contact-name" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="contact-phone" placeholder="Phone Number" required>
                </div>
                <button type="submit" class="btn btn-primary" style="padding: 12px;">Add Contact</button>
            </form>
        </div>

        <div class="page-header">
            <h3>Saved Contacts</h3>
        </div>

        <div id="contacts-list">
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script src="contacts.js"></script>
</body>
</html>
