<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fake Call Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="screen active">
        <div class="header">
            <h1>FakeCall</h1>
            <p>Discreet Escape Utility</p>
        </div>
        
        <div class="form-container">
            <div class="input-group">
                <label>Caller Identity</label>
                <input type="text" id="caller-name" placeholder="Mom, Boss, etc.">
            </div>
            
            <div class="input-group">
                <label>Incoming In:</label>
                <select id="call-delay">
                    <option value="3">3 Seconds (Quick)</option>
                    <option value="10">10 Seconds</option>
                    <option value="30">30 Seconds</option>
                    <option value="60">1 Minute</option>
                </select>
            </div>

            <button id="schedule-btn">Activate Timer</button>
        </div>
    </div>

    <div id="ringing-screen" class="screen call-ui">
        <div class="caller-details">
            <h2 id="display-name">Unknown</h2>
            <p class="blink">Incoming Call...</p>
        </div>
        
        <div class="call-actions">
            <div class="btn-wrap">
                <button class="circle-btn decline" id="decline-btn">✕</button>
                <p>Decline</p>
            </div>
            <div class="btn-wrap">
                <button class="circle-btn accept" id="accept-btn">📞</button>
                <p>Accept</p>
            </div>
        </div>
    </div>

    <div id="active-screen" class="screen call-ui active-bg">
        <div class="caller-details">
            <h2 id="active-name">Unknown</h2>
            <p id="call-timer">00:00</p>
        </div>

        <div class="keypad-grid">
            <div class="key"><span>🔇</span><p>Mute</p></div>
            <div class="key"><span>🔢</span><p>Keypad</p></div>
            <div class="key"><span>🔊</span><p>Speaker</p></div>
            <div class="key"><span>➕</span><p>Add</p></div>
            <div class="key"><span>📹</span><p>Video</p></div>
            <div class="key"><span>👤</span><p>Contacts</p></div>
        </div>

        <button class="circle-btn hangup" id="end-btn">📞</button>
    </div>

    <audio id="ringtone-audio" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
