<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SafeNova Widget</title>
	<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
	<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" href="shared-navbar.css">
	<style>
		body {
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background: #f4f6f9;
			color: #1f2937;
		}

		.widget-shell {
			max-width: 560px;
			margin: 48px auto;
			padding: 0 20px;
			text-align: center;
		}

		.widget-card {
			background: #ffffff;
			border-radius: 20px;
			padding: 32px 24px;
			box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
		}

		.widget-card h2 {
			margin: 0 0 12px;
		}

		.widget-card p {
			margin: 0 0 24px;
			color: #6b7280;
		}

		.widget-card button {
			padding: 15px 28px;
			font-size: 20px;
			background: #ff3b30;
			color: white;
			border: none;
			border-radius: 12px;
			font-weight: 700;
			cursor: pointer;
		}
	</style>
</head>
<body>
	<nav class="sn-navbar">
		<a href="index.html" class="sn-logo">
			SafeNova
			<div class="sn-logo-dot"></div>
		</a>
		<ul class="sn-nav-links">
			<li><a href="index.html">Home</a></li>
			<li><a href="contacts/contacts.html">Contacts</a></li>
			<li><a href="tracking/tracking.html">Tracking</a></li>
			<li><a href="settings/settings.html">Settings</a></li>
		</ul>
		<div class="sn-nav-actions">
            <div class="sn-user-info" id="userInfo" style="display: none;">
                <span class="sn-user-name" id="userName">Loading...</span>
                <button id="logoutBtn" class="sn-logout-btn" aria-label="Logout">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
			<a href="login/login.html" class="sn-login-btn" id="loginNavBtn">Login</a>
            <button id="themeToggle" class="sn-theme-btn" aria-label="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
		</div>
	</nav>

	<main class="widget-shell">
		<section class="widget-card">
			<h2>SafeNova SOS</h2>
			<p>Quick access widget for a manual emergency trigger.</p>
			<button onclick="triggerSOS()">SOS</button>
		</section>
	</main>

	<script>
	function triggerSOS() {
		alert("SOS Triggered");
	}
	</script>
</body>
</html>
